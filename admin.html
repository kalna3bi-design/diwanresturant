<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة — الديوان</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060810;--s1:#0a0e1a;--card:#0f1420;--card2:#141c2c;
  --border:#1a2438;--border2:#223050;
  --blue:#3d82e8;--blue2:#6ba0f5;--cyan:#28b8d0;
  --gold:#d4a843;--gold2:#e8c060;
  --green:#38b870;--green2:#50d490;
  --red:#e05050;--orange:#e08830;
  --text:#dce8f8;--muted:#4e6888;--dim:#1e2e44;--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(61,130,232,.07),transparent),
    radial-gradient(ellipse 60% 50% at 80% 90%,rgba(40,184,208,.05),transparent)}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1rem}
#loginScreen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(61,130,232,.09),transparent)}
.lbox{position:relative;z-index:1;background:var(--card);border:1px solid var(--border2);border-radius:22px;
  padding:44px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.lico{width:68px;height:68px;background:linear-gradient(145deg,var(--blue),var(--cyan));border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;box-shadow:0 8px 28px rgba(61,130,232,.4)}
.lbox h1{font-size:1.4rem;font-weight:900;margin-bottom:4px}
.lbox p{font-size:.78rem;color:var(--muted);margin-bottom:28px;letter-spacing:.8px}
.lerr{background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);border-radius:9px;padding:9px 14px;font-size:.8rem;color:var(--red);margin-bottom:12px;display:none}
.lfield{text-align:right;margin-bottom:12px}
.lfield label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px}
.lfield input{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:11px;color:var(--text);
  font-family:'Tajawal',sans-serif;font-size:.93rem;padding:11px 14px;outline:none;transition:.2s;direction:ltr;text-align:left}
.lfield input:focus{border-color:var(--blue)}
.lbtn{width:100%;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:12px;
  padding:13px;color:#fff;font-family:'Tajawal',sans-serif;font-weight:900;font-size:.98rem;cursor:pointer;margin-top:4px;transition:.2s}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(61,130,232,.5)}
.lhint{font-size:.72rem;color:var(--dim);margin-top:14px}

#app{display:none}

/* HEADER */
.ahdr{position:sticky;top:0;z-index:100;height:62px;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;background:rgba(6,8,16,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.ahlogo{display:flex;align-items:center;gap:10px}
.ahmark{width:38px;height:38px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 12px rgba(61,130,232,.35)}
.ahlogo h1{font-size:1.05rem;font-weight:900}
.ahlogo span{font-size:.62rem;color:var(--muted);letter-spacing:2px;display:block;text-transform:uppercase;margin-top:-2px}
.ahright{display:flex;align-items:center;gap:8px}
.live{display:flex;align-items:center;gap:6px}
.ldot{width:7px;height:7px;background:var(--green2);border-radius:50%;animation:ldp 1.5s infinite}
@keyframes ldp{0%,100%{box-shadow:0 0 0 0 rgba(80,212,144,.5)}50%{box-shadow:0 0 0 5px rgba(80,212,144,0)}}
.llbl{font-size:.78rem;color:var(--muted)}
.lgbtn{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:6px 14px;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.8rem;cursor:pointer;transition:.2s}
.lgbtn:hover{color:var(--red);border-color:rgba(224,80,80,.3)}

/* STATS */
.stats{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-v{font-size:1.7rem;font-weight:900;line-height:1}
.stat-l{font-size:.7rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.stat.blue .stat-v{color:var(--blue2)}.stat.gold .stat-v{color:var(--gold2)}
.stat.green .stat-v{color:var(--green2)}.stat.orange .stat-v{color:var(--orange)}

/* TABS */
.tabs{position:relative;z-index:1;display:flex;gap:7px;padding:0 1.25rem 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--card);border:1px solid var(--border);border-radius:50px;padding:8px 18px;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.83rem;cursor:pointer;white-space:nowrap;
  transition:.2s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.on{background:linear-gradient(135deg,var(--blue),var(--cyan));border-color:transparent;color:#fff;font-weight:900}
.tc{background:rgba(255,255,255,.15);border-radius:20px;padding:2px 7px;font-size:.7rem;font-weight:900}
.tab.on .tc{background:rgba(0,0,0,.25)}

/* GRID */
.ogrid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;padding:0 1.25rem 2rem}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.25s;animation:fadeUp .3s ease both}
.ocard:hover{border-color:var(--border2);box-shadow:0 8px 30px rgba(0,0,0,.5)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ocard.pending{border-color:rgba(80,212,144,.2)}
.ocard.confirmed{border-color:rgba(107,160,245,.2)}
.ocard.preparing{border-color:rgba(212,168,67,.25)}
.ocard.ready{border-color:rgba(107,160,245,.4);animation:readyBlink 2s infinite}
@keyframes readyBlink{0%,100%{box-shadow:0 0 0 rgba(107,160,245,0)}50%{box-shadow:0 0 18px rgba(107,160,245,.15)}}
.ocard.done{opacity:.55}
.och{padding:14px 14px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ometa{display:flex;flex-direction:column;gap:3px}
.otbl{font-size:1rem;font-weight:900}
.oid{font-size:.7rem;color:var(--muted);background:var(--card2);padding:2px 8px;border-radius:6px;display:inline-block}
.otime{font-size:.72rem;color:var(--muted)}
.sbadge{padding:6px 12px;border-radius:20px;font-size:.73rem;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.sbadge.pending{background:rgba(80,212,144,.1);color:var(--green2);border:1px solid rgba(80,212,144,.2)}
.sbadge.confirmed{background:rgba(107,160,245,.1);color:var(--blue2);border:1px solid rgba(107,160,245,.2)}
.sbadge.preparing{background:rgba(212,168,67,.1);color:var(--gold2);border:1px solid rgba(212,168,67,.2)}
.sbadge.ready{background:rgba(107,160,245,.15);color:#8ab8ff;border:1px solid rgba(107,160,245,.4);animation:rbglow 1.5s infinite}
@keyframes rbglow{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px rgba(107,160,245,.3)}}
.sbadge.done{background:rgba(78,104,136,.1);color:var(--muted);border:1px solid var(--border)}
.oitems{padding:12px 14px 0;display:flex;flex-wrap:wrap;gap:6px}
.ochip{background:var(--card2);border:1px solid var(--border2);border-radius:18px;padding:3px 10px;font-size:.77rem;display:flex;align-items:center;gap:5px}
.cqty{background:var(--blue);color:#fff;border-radius:50%;width:17px;height:17px;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.onote{margin:10px 14px 0;background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:.76rem;color:var(--muted);line-height:1.6}

/* TIMER */
.otimer{padding:12px 14px}
.timer-input-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.timer-input-row label{font-size:.78rem;color:var(--muted);white-space:nowrap}
.timer-inputs{display:flex;align-items:center;gap:6px}
.tnum{background:var(--card2);border:1px solid var(--border2);border-radius:9px;color:var(--text);
  font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:900;width:60px;padding:7px 8px;
  outline:none;text-align:center;transition:.2s;-webkit-appearance:none;appearance:none}
.tnum::-webkit-inner-spin-button,.tnum::-webkit-outer-spin-button{-webkit-appearance:none}
.tnum:focus{border-color:var(--blue)}
.tunit{font-size:.76rem;color:var(--muted)}
.tpresets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tpre{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:4px 10px;
  font-size:.74rem;color:var(--muted);cursor:pointer;transition:.2s;font-family:'Tajawal',sans-serif}
.tpre:hover{border-color:var(--blue);color:var(--blue2)}
.tcount-row{display:flex;align-items:center;gap:12px}
.tcount{font-size:1.6rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-1px;color:var(--blue2);min-width:80px}
.tcount.urgent{color:var(--red)}.tcount.done-c{color:var(--green2)}
.tprog-wrap{flex:1}
.tpbar{height:7px;background:var(--dim);border-radius:7px;overflow:hidden}
.tpfill{height:100%;border-radius:7px;transition:width .8s linear;overflow:hidden;position:relative}
.tpfill.running{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.tpfill.urgent{background:linear-gradient(90deg,var(--orange),var(--red))}
.tpfill.done-f{background:linear-gradient(90deg,var(--green),var(--green2))}
.tpfill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:60px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25));animation:tsh 1.3s infinite}
@keyframes tsh{0%{transform:translateX(60px)}100%{transform:translateX(-100px)}}
.tpct{font-size:.7rem;color:var(--muted);margin-top:3px;text-align:left}

/* ACTIONS */
.oactions{padding:0 14px 14px;display:flex;gap:7px;flex-wrap:wrap}
.abtn{flex:1;border:none;border-radius:9px;padding:9px 12px;font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:.2s;min-width:70px}
.abtn:hover{transform:translateY(-1px)}
.abtn.confirm{background:rgba(80,212,144,.12);color:var(--green2);border:1px solid rgba(80,212,144,.25)}
.abtn.confirm:hover{background:rgba(80,212,144,.22)}
.abtn.go{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border:none}
.abtn.go:hover{box-shadow:0 4px 14px rgba(61,130,232,.4)}
.abtn.rdy{background:rgba(107,160,245,.12);color:var(--blue2);border:1px solid rgba(107,160,245,.25)}
.abtn.rdy:hover{background:rgba(107,160,245,.22)}
.abtn.dn{background:rgba(78,104,136,.1);color:var(--muted);border:1px solid var(--border2)}
.abtn.cl{background:rgba(224,80,80,.08);color:var(--red);border:1px solid rgba(224,80,80,.18)}
.abtn.cl:hover{background:rgba(224,80,80,.18)}

/* HISTORY */
.hist-day{position:relative;z-index:1;margin:0 1.25rem 20px}
.hdl{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdl-line{flex:1;height:1px;background:var(--border)}
.hdl-txt{font-size:.78rem;color:var(--muted);white-space:nowrap;background:var(--bg);padding:0 10px;letter-spacing:1px}
.hist-sum{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:12px 16px;margin-bottom:10px;display:flex;gap:24px;flex-wrap:wrap}
.hs-item .hs-v{font-size:1.1rem;font-weight:900;color:var(--blue2)}
.hs-item .hs-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* EMPTY / NOTIF */
.empty{text-align:center;padding:56px 20px;color:var(--muted);grid-column:1/-1}
.empty .ei{font-size:2.8rem;margin-bottom:10px}
.notif-banner{position:fixed;top:72px;right:1.25rem;z-index:500;background:var(--card2);
  border:1px solid rgba(80,212,144,.4);border-radius:13px;padding:14px 18px;
  display:none;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.6);animation:nb .4s ease}
@keyframes nb{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.nbico{font-size:1.8rem}
.nbinfo h4{font-size:.9rem;font-weight:800;margin-bottom:1px}
.nbinfo p{font-size:.76rem;color:var(--muted)}
.nbx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;margin-right:auto}
.toasts{position:fixed;bottom:1.25rem;right:1.25rem;z-index:600;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:11px;padding:11px 15px;
  font-size:.83rem;animation:tIn .3s ease,tOut .3s ease 3s forwards;box-shadow:0 8px 24px rgba(0,0,0,.5)}
@keyframes tIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(14px)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .ogrid{grid-template-columns:1fr}
  .ahdr,.stats,.tabs,.ogrid,.hist-day{padding-right:.9rem;padding-left:.9rem}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="lico">🔐</div>
    <h1>لوحة الإدارة</h1>
    <p>مطعم الديوان — للموظفين فقط</p>
    <div class="lerr" id="lerr">❌ بيانات الدخول غير صحيحة</div>
    <div class="lfield"><label>اسم المستخدم</label><input type="text" id="uname" placeholder="admin" autocomplete="off"></div>
    <div class="lfield"><label>كلمة المرور</label><input type="password" id="upass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="lbtn" onclick="doLogin()">دخول ←</button>
    <div class="lhint">admin / diwaan2024</div>
  </div>
</div>

<div id="app">
  <div class="ahdr">
    <div class="ahlogo">
      <div class="ahmark">📊</div>
      <div><h1>لوحة الإدارة والمطبخ</h1><span>مطعم الديوان</span></div>
    </div>
    <div class="ahright">
      <div class="live"><div class="ldot"></div><span class="llbl">مباشر</span></div>
      <button class="lgbtn" onclick="doLogout()">↩ خروج</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat blue"><div class="stat-v" id="sNew">0</div><div class="stat-l">جديد</div></div>
    <div class="stat gold"><div class="stat-v" id="sPrep">0</div><div class="stat-l">يُحضَّر</div></div>
    <div class="stat green"><div class="stat-v" id="sRdy">0</div><div class="stat-l">جاهز</div></div>
    <div class="stat orange"><div class="stat-v" id="sDone">0</div><div class="stat-l">مكتمل اليوم</div></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-live" onclick="setTab('live',this)">🔴 مباشر <span class="tc" id="tc-live">0</span></button>
    <button class="tab" onclick="setTab('pending',this)">📥 جديد <span class="tc" id="tc-pending">0</span></button>
    <button class="tab" onclick="setTab('confirmed',this)">✅ مؤكد <span class="tc" id="tc-confirmed">0</span></button>
    <button class="tab" onclick="setTab('preparing',this)">👨‍🍳 يُحضَّر <span class="tc" id="tc-preparing">0</span></button>
    <button class="tab" onclick="setTab('ready',this)">🔔 جاهز <span class="tc" id="tc-ready">0</span></button>
    <button class="tab" onclick="setTab('done',this)">✓ مكتمل <span class="tc" id="tc-done">0</span></button>
    <button class="tab" onclick="setTab('history',this)">📅 السجل <span class="tc" id="tc-history">0</span></button>
  </div>

  <div id="mainContent"></div>
</div>

<div class="notif-banner" id="notifBanner">
  <span class="nbico">🛎</span>
  <div class="nbinfo"><h4 id="nbTitle">طلب جديد!</h4><p id="nbSub"></p></div>
  <button class="nbx" onclick="closeNotif()">✕</button>
</div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

// ══════════════════════════════════════════════
//  🔥 الصق إعدادات Firebase هنا (نفس menu.html)
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAVnSlVrA0LXb4u0Z5RY1ubAr5Znz5ajYo",
  authDomain:        "diwan-restaurant.firebaseapp.com",
  databaseURL:       "https://diwan-restaurant-default-rtdb.firebaseio.com",
  projectId:         "diwan-restaurant",
  storageBucket:     "diwan-restaurant.firebasestorage.app",
  messagingSenderId: "823070739262",
  appId:             "1:823070739262:web:4480987957092d1ea83a6f"
};
// ══════════════════════════════════════════════

const CREDS={admin:'diwaan2024',manager:'diwan123',kitchen:'kitchen99'};
let loggedIn=false, curTab='live', allOrders=[], timers={}, dingDone={}, firstLoad=true;

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const ordersRef=ref(db,'orders');

// ── AUTH ──
window.doLogin=function(){
  const u=document.getElementById('uname').value.trim(),p=document.getElementById('upass').value;
  if(CREDS[u]===p){
    loggedIn=true;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    startListening();
  }else{document.getElementById('lerr').style.display='block';document.getElementById('upass').value='';}
};
window.doLogout=function(){
  loggedIn=false;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
};

// ── REAL-TIME LISTENER ──
function startListening(){
  onValue(ordersRef, snap=>{
    const prev=allOrders.map(o=>o._key);
    allOrders=[];
    if(snap.exists()){
      snap.forEach(child=>allOrders.push({...child.val(),_key:child.key}));
      allOrders.sort((a,b)=>b.ts-a.ts);
    }
    // Detect new orders
    if(!firstLoad){
      allOrders.forEach(o=>{
        if(!prev.includes(o._key)&&o.status==='pending'){
          showNotif(`🛎 طلب جديد — طاولة ${o.table}`,`${o.items.length} صنف — ${o.total.toFixed(3)} ر.ع`);
          playAlert();
        }
      });
    }
    firstLoad=false;
    render();
  });
}

// ── RENDER ──
window.setTab=function(t,el){curTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();};

function render(){
  if(!loggedIn) return;
  updateStats();updateTabCounts();
  if(curTab==='history') renderHistory();
  else renderOrders();
}

function updateStats(){
  const today=new Date().toLocaleDateString('ar-OM');
  document.getElementById('sNew').textContent=allOrders.filter(o=>o.status==='pending').length;
  document.getElementById('sPrep').textContent=allOrders.filter(o=>o.status==='preparing').length;
  document.getElementById('sRdy').textContent=allOrders.filter(o=>o.status==='ready').length;
  document.getElementById('sDone').textContent=allOrders.filter(o=>o.status==='done'&&o.date===today).length;
}
function updateTabCounts(){
  const live=allOrders.filter(o=>['pending','confirmed','preparing','ready'].includes(o.status));
  document.getElementById('tc-live').textContent=live.length;
  ['pending','confirmed','preparing','ready','done'].forEach(s=>{
    const el=document.getElementById('tc-'+s);
    if(el) el.textContent=allOrders.filter(o=>o.status===s).length;
  });
  document.getElementById('tc-history').textContent=allOrders.length;
}

const SL={pending:'📥 جديد',confirmed:'✅ مؤكد',preparing:'👨‍🍳 يُحضَّر',ready:'🔔 جاهز',done:'✓ مكتمل'};

function renderOrders(){
  let orders=curTab==='live'
    ?allOrders.filter(o=>['pending','confirmed','preparing','ready'].includes(o.status))
    :allOrders.filter(o=>o.status===curTab);
  const c=document.getElementById('mainContent');
  if(!orders.length){c.innerHTML='<div class="ogrid"><div class="empty"><div class="ei">📋</div><p>لا توجد طلبات</p></div></div>';return;}
  c.innerHTML=`<div class="ogrid">${orders.map((o,i)=>cardHtml(o,i)).join('')}</div>`;
  orders.forEach(o=>{if((o.status==='preparing'||o.status==='ready')&&o.timerEnd) startLiveTimer(o._key,o.timerEnd,o.timerDuration);});
}

function cardHtml(o,i){
  return `<div class="ocard ${o.status}" style="animation-delay:${i*.04}s">
    <div class="och">
      <div class="ometa">
        <div class="otbl">🪑 طاولة ${o.table}</div>
        <span class="oid">${o._key.slice(-7)}</span>
        <div class="otime">🕐 ${o.time}${o.date?' · '+o.date:''}</div>
      </div>
      <div class="sbadge ${o.status}">${SL[o.status]||o.status}</div>
    </div>
    <div class="oitems">${o.items.map(it=>`<div class="ochip"><span class="cqty">${it.qty}</span>${it.emoji} ${it.name}</div>`).join('')}</div>
    ${o.note?`<div class="onote">📝 ${o.note}</div>`:''}
    ${timerHtml(o)}
    ${actionsHtml(o)}
    <div style="padding:6px 14px 10px;display:flex;justify-content:flex-end">
      <span style="font-size:.95rem;font-weight:900;color:var(--gold2)">${o.total.toFixed(3)} ر.ع</span>
    </div>
  </div>`;
}

function timerHtml(o){
  if(o.status==='pending') return '';
  if(o.status==='done') return `<div class="otimer"><div class="tcount-row"><span class="tcount done-c">✓ مكتمل</span><div class="tprog-wrap"><div class="tpbar"><div class="tpfill done-f" style="width:100%"></div></div></div></div></div>`;
  if(o.status==='confirmed') return `
    <div class="otimer">
      <div class="timer-input-row"><label>⏱ مدة التحضير:</label>
        <div class="timer-inputs"><input type="number" class="tnum" id="tm-${o._key}" value="10" min="1" max="120"><span class="tunit">دقيقة</span></div>
      </div>
      <div class="tpresets">
        ${[5,10,15,20,30,45,60].map(m=>`<button class="tpre" onclick="setPre('${o._key}',${m})">${m<60?m+'د':'ساعة'}</button>`).join('')}
      </div>
    </div>`;
  if(o.timerEnd){
    const now=Date.now(),rem=Math.max(0,o.timerEnd-now),dur=o.timerDuration||1;
    const pct=Math.min(100,((dur-rem)/dur)*100),urgent=rem<120000&&rem>0;
    return `<div class="otimer"><div class="tcount-row">
      <span class="tcount${urgent?' urgent':''}" id="cd-${o._key}">—</span>
      <div class="tprog-wrap"><div class="tpbar"><div class="tpfill ${urgent?'urgent':'running'}" id="tf-${o._key}" style="width:${pct}%"></div></div>
      <div class="tpct" id="tp-${o._key}">${Math.round(pct)}%</div></div></div></div>`;
  }
  return '';
}

function actionsHtml(o){
  let b=[];
  if(o.status==='pending'){b.push(`<button class="abtn confirm" onclick="confirmOrd('${o._key}')">✅ تأكيد</button>`);b.push(`<button class="abtn cl" onclick="cancelOrd('${o._key}')">✕ إلغاء</button>`);}
  if(o.status==='confirmed') b.push(`<button class="abtn go" onclick="startPrep('${o._key}')">▶ ابدأ التحضير</button>`);
  if(o.status==='preparing') b.push(`<button class="abtn rdy" onclick="markReady('${o._key}')">🔔 جاهز للتقديم</button>`);
  if(o.status==='ready') b.push(`<button class="abtn dn" onclick="markDone('${o._key}')">✓ تم التسليم</button>`);
  return b.length?`<div class="oactions">${b.join('')}</div>`:'';
}

// ── FIREBASE ACTIONS ──
window.setPre=function(key,m){const el=document.getElementById('tm-'+key);if(el) el.value=m;};

window.confirmOrd=function(key){
  update(ref(db,'orders/'+key),{status:'confirmed'});
  toast('✅ تم التأكيد');playS(440,.8);
};

window.startPrep=function(key){
  const el=document.getElementById('tm-'+key);
  const mins=Math.max(1,parseInt(el?el.value:10)||10);
  const dur=mins*60*1000,timerEnd=Date.now()+dur;
  update(ref(db,'orders/'+key),{status:'preparing',timerEnd,timerDuration:dur});
  toast(`👨‍🍳 بدأ التحضير — ${mins} دقيقة`);playS(528,.8);
};

window.markReady=function(key){
  clearInterval(timers[key]);
  update(ref(db,'orders/'+key),{status:'ready'});
  toast('🔔 الطلب جاهز!');playDing();
};

window.markDone=function(key){
  clearInterval(timers[key]);
  update(ref(db,'orders/'+key),{status:'done'});
  toast('✓ تم التسليم');
};

window.cancelOrd=function(key){
  if(!confirm('إلغاء هذا الطلب؟')) return;
  remove(ref(db,'orders/'+key));
  toast('🗑 تم الإلغاء');
};

// ── LIVE TIMERS ──
function startLiveTimer(key,timerEnd,dur){
  clearInterval(timers[key]);
  timers[key]=setInterval(()=>{
    const now=Date.now(),rem=Math.max(0,timerEnd-now),pct=Math.min(100,((dur-rem)/dur)*100),urgent=rem<120000&&rem>0;
    const cd=document.getElementById('cd-'+key),tf=document.getElementById('tf-'+key),tp=document.getElementById('tp-'+key);
    if(cd){
      if(rem<=0){cd.textContent='انتهى!';cd.className='tcount done-c';}
      else{const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);cd.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;cd.className=`tcount${urgent?' urgent':''}`;}
    }
    if(tf){tf.style.width=pct+'%';tf.className=`tpfill ${rem<=0?'done-f':urgent?'urgent':'running'}`;}
    if(tp) tp.textContent=Math.round(pct)+'%';
    if(rem<=0&&!dingDone[key]){
      dingDone[key]=true;playDing();
      const o=allOrders.find(x=>x._key===key);
      if(o&&o.status==='preparing'){
        update(ref(db,'orders/'+key),{status:'ready'});
        showNotif(`🔔 طلب طاولة ${o.table} جاهز!`,`${o._key.slice(-5)} — انتهى وقت التحضير`);
      }
      clearInterval(timers[key]);
    }
  },500);
}

// ── HISTORY ──
function renderHistory(){
  const c=document.getElementById('mainContent');
  const byDate={};
  allOrders.forEach(o=>{const d=o.date||'—';if(!byDate[d]) byDate[d]=[];byDate[d].push(o);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  if(!dates.length){c.innerHTML='<div class="ogrid"><div class="empty"><div class="ei">📅</div><p>لا يوجد سجل بعد</p></div></div>';return;}
  c.innerHTML=dates.map(d=>{
    const day=byDate[d],rev=day.reduce((s,o)=>s+o.total,0),done=day.filter(o=>o.status==='done').length;
    return `<div class="hist-day">
      <div class="hdl"><div class="hdl-line"></div><div class="hdl-txt">📅 ${d}</div><div class="hdl-line"></div></div>
      <div class="hist-sum">
        <div class="hs-item"><div class="hs-v">${day.length}</div><div class="hs-l">إجمالي</div></div>
        <div class="hs-item"><div class="hs-v">${done}</div><div class="hs-l">مكتمل</div></div>
        <div class="hs-item"><div class="hs-v">${rev.toFixed(3)}</div><div class="hs-l">إيراد ر.ع</div></div>
      </div>
      <div class="ogrid">${day.map((o,i)=>cardHtml(o,i)).join('')}</div>
    </div>`;
  }).join('');
}

// ── NOTIF / AUDIO ──
function showNotif(title,sub){
  const b=document.getElementById('notifBanner');
  document.getElementById('nbTitle').textContent=title;
  document.getElementById('nbSub').textContent=sub;
  b.style.display='flex';clearTimeout(window._ntmr);window._ntmr=setTimeout(closeNotif,8000);
}
window.closeNotif=function(){document.getElementById('notifBanner').style.display='none';};

function gCtx(){if(!window._ac) window._ac=new(window.AudioContext||window.webkitAudioContext)();return window._ac;}
function playS(freq,dur){try{const ctx=gCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}}
function playDing(){[[880,.5,0],[1100,.4,.2],[880,.3,.42]].forEach(([f,v,d])=>setTimeout(()=>playS(f,v*1.4),d*1000));}
function playAlert(){[[660,.45,0],[880,.4,.18],[660,.35,.38],[880,.3,.56]].forEach(([f,v,d])=>setTimeout(()=>playS(f,v*1.2),d*1000));}
document.addEventListener('click',()=>{try{gCtx()}catch(e){}},{once:true});

function toast(msg){const c=document.getElementById('toasts'),el=document.createElement('div');el.className='toast';el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
</script>
</body>
